<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8">
<title>OG · MyBeautyKey Team</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 1200px;
    height: 630px;
    overflow: hidden;
    font-family: Helvetica, Arial, sans-serif;
    background: linear-gradient(135deg, #f6e6e1 0%, #fbf6f0 60%, #f5e6dc 100%);
    color: #2d2a26;
  }
  .canvas {
    width: 1200px;
    height: 630px;
    position: relative;
    padding: 70px 90px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
  }
  /* Decorative accent circles */
  .circle1 {
    position: absolute;
    top: -180px;
    right: -180px;
    width: 500px;
    height: 500px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(224, 177, 168, 0.6) 0%, rgba(224, 177, 168, 0) 70%);
  }
  .circle2 {
    position: absolute;
    bottom: -220px;
    left: -220px;
    width: 550px;
    height: 550px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(212, 165, 147, 0.5) 0%, rgba(212, 165, 147, 0) 70%);
  }

  .brand-row {
    display: flex;
    align-items: center;
    gap: 18px;
    position: relative;
    z-index: 2;
  }
  .brand-dot {
    width: 46px;
    height: 46px;
    border-radius: 50%;
    background: linear-gradient(135deg, #e0b1a8, #d4a593);
    box-shadow: 0 6px 20px rgba(201, 143, 132, 0.35);
  }
  .brand-name {
    font-family: Georgia, "Times New Roman", serif;
    font-size: 32px;
    font-weight: 500;
    letter-spacing: 0.03em;
    color: #2d2a26;
  }
  .eyebrow {
    font-size: 15px;
    letter-spacing: 0.28em;
    color: #a07560;
    font-weight: 700;
    text-transform: uppercase;
    margin-top: 14px;
    position: relative;
    z-index: 2;
  }

  .headline {
    position: relative;
    z-index: 2;
    font-family: Georgia, "Times New Roman", serif;
    font-size: 76px;
    line-height: 1.05;
    font-weight: 500;
    color: #2d2a26;
    max-width: 900px;
  }
  .headline b {
    color: #a07560;
    font-weight: 500;
  }
  .subline {
    position: relative;
    z-index: 2;
    font-size: 24px;
    line-height: 1.4;
    color: #5c5651;
    max-width: 780px;
    margin-top: 18px;
  }

  .footer-row {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    position: relative;
    z-index: 2;
  }
  .footer-left {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
  }
  .chip {
    background: rgba(255, 255, 255, 0.75);
    border: 1px solid #efe5dc;
    color: #7a5641;
    font-size: 15px;
    font-weight: 600;
    padding: 10px 18px;
    border-radius: 30px;
    letter-spacing: 0.02em;
  }
  .url {
    font-family: Georgia, serif;
    font-size: 22px;
    color: #a07560;
    font-weight: 500;
    letter-spacing: 0.06em;
  }
</style>
</head>
<body>
<div class="canvas">
  <div class="circle1"></div>
  <div class="circle2"></div>

  <div>
    <div class="brand-row">
      <div class="brand-dot"></div>
      <div class="brand-name">MyBeautyKey</div>
    </div>
    <div class="eyebrow">Vorschau für Sinas Team</div>
  </div>

  <div>
    <div class="headline">Deine Beratung — nur <b>konsistenter</b>, <b>schneller</b>, mit mehr Übersicht.</div>
    <div class="subline">Konsistente Analyse, Leads im Dashboard, Ergebnis in Sekunden für deine Kundin.</div>
  </div>

  <div class="footer-row">
    <div class="footer-left">
      <div class="chip">Konsistente Beratung</div>
      <div class="chip">Ergebnis in Sekunden</div>
      <div class="chip">Team-Bibliothek</div>
    </div>
    <div class="url">mybeautykey.de</div>
  </div>
</div>
</body>
</html>
